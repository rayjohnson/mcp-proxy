name: Release

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Merges that touch only these paths do not require a VERSION bump and will
  # not trigger a release tag. Uses Python fnmatch glob syntax, one per line.
  VERSION_EXEMPT_PATHS: |
    .github/workflows/**
    specs/**
    *.md

jobs:
  detect-changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.classify.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          {
            echo 'files<<EOF'
            git diff --name-only "$BASE" HEAD
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Classify changes against exempt paths
        id: classify
        shell: python3 {0}
        env:
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
        run: |
          import os, fnmatch

          changed  = [f for f in os.environ["CHANGED_FILES"].splitlines() if f]
          patterns = [p.strip() for p in os.environ["VERSION_EXEMPT_PATHS"].splitlines() if p.strip()]

          print("Changed files:")
          for f in changed:
              print(f"  {f}")
          print(f"\nExempt patterns: {patterns}")

          def is_exempt(path):
              return any(fnmatch.fnmatch(path, p) for p in patterns)

          code_changed = any(not is_exempt(f) for f in changed)
          print(f"\nResult: {'code changes detected' if code_changed else 'only exempt paths changed — no release needed'}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"code_changed={'true' if code_changed else 'false'}\n")

  version-check:
    name: Version bump check
    needs: detect-changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION file exists
        run: |
          if [ ! -f VERSION ]; then
            echo "::error file=VERSION::VERSION file is missing. Create one in the repo root (e.g. echo '0.1.0' > VERSION)."
            exit 1
          fi

      - name: Skip — only exempt paths changed
        if: needs.detect-changes.outputs.code_changed == 'false'
        run: echo "Only exempt paths changed — version bump not required."

      - name: Verify VERSION is bumped above main
        if: needs.detect-changes.outputs.code_changed == 'true'
        run: |
          BRANCH_VERSION=$(cat VERSION)
          MAIN_VERSION=$(git show origin/main:VERSION 2>/dev/null || echo "0.0.0")
          echo "Branch VERSION : $BRANCH_VERSION"
          echo "main   VERSION : $MAIN_VERSION"

          if [ "$BRANCH_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error file=VERSION::VERSION ($BRANCH_VERSION) must be greater than main ($MAIN_VERSION). Bump VERSION before merging."
            exit 1
          fi

          HIGHER=$(printf '%s\n' "$MAIN_VERSION" "$BRANCH_VERSION" | sort -V | tail -1)
          if [ "$HIGHER" != "$BRANCH_VERSION" ]; then
            echo "::error file=VERSION::VERSION ($BRANCH_VERSION) is not greater than main ($MAIN_VERSION). Bump VERSION before merging."
            exit 1
          fi

          echo "Version bump verified: $MAIN_VERSION → $BRANCH_VERSION"

  tag-release:
    name: Tag and release
    needs: detect-changes
    # Only runs for code-changing merges — skipped entirely for exempt-only merges.
    if: github.event_name == 'push' && needs.detect-changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION file exists
        run: |
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file is missing from the repository. This should not happen — the version-check job should have caught this."
            exit 1
          fi

      - name: Read VERSION
        id: ver
        run: echo "tag=v$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "::error file=VERSION::Tag $TAG already exists. VERSION must be bumped before merging code changes to main."
            exit 1
          fi

      - name: Create and push tag
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged $TAG"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
