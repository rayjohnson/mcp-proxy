{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Proxy</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <nav>
    <a href="/dashboard">Dashboard</a>
    {{if .IsAdmin}}
    <a href="/admin/catalog">Catalog</a>
    <a href="/admin/users">Users</a>
    {{end}}
    <form method="post" action="/api/auth/logout" style="display:inline">
      <button type="submit">Logout</button>
    </form>
  </nav>
  <main>
    {{template "content" .}}
  </main>
  {{if .Version}}
  <footer>
    <span class="version-label">mcp-proxy {{.Version}}</span>
    {{if .IsAdmin}}
    <span id="update-badge" style="margin-left:1rem">
      <button id="check-update-btn" class="secondary" style="font-size:0.75rem;padding:0.2rem 0.6rem" onclick="checkForUpdate()">Check for updates</button>
    </span>
    <script>
    function checkForUpdate() {
      var badge = document.getElementById('update-badge');
      var btn = document.getElementById('check-update-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Checking…'; }
      fetch('/api/version/check')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.update_available) {
            badge.innerHTML = '<button id="update-btn" class="button" style="font-size:0.75rem;padding:0.2rem 0.6rem">Update to v' + d.latest + '</button>';
            document.getElementById('update-btn').addEventListener('click', function() {
              if (!confirm('Update mcp-proxy to v' + d.latest + '? The server will restart.')) return;
              var ub = document.getElementById('update-btn');
              ub.disabled = true;
              ub.textContent = 'Updating…';
              fetch('/api/admin/update', {method:'POST'})
                .then(function() { ub.textContent = 'Restarting — refresh in a few seconds'; })
                .catch(function() { ub.textContent = 'Update started — refresh shortly'; });
            });
          } else {
            badge.innerHTML = '<span style="font-size:0.75rem;color:#6c757d">Up to date (v' + d.latest + ')</span>';
          }
        })
        .catch(function() {
          if (btn) { btn.disabled = false; btn.textContent = 'Check for updates'; }
        });
    }
    </script>
    {{end}}
  </footer>
  {{end}}
</body>
</html>
{{end}}
